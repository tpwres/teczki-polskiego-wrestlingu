[01-obraz]
path = "obraz-front.webp"
caption = """\
Agentka Agatka's painting showing wrestlers tumbling on the floor after a risky maneouver. The fans surrounding them remain almost out of focus, in muted gray colors, but wrestlers are painted with great attention to detail.

Goblin is the most recognizable character, in the right-center of the canvas.
Left of him is Axel Fox, and above him Jakob Linde.
Fox's leg obscures Gustav Gryffin's face.
Below Gustav is Biesiad, and on his legs we can see the bald head of Marco Hammers.
"""
source = "Krzysztof Zych"

[02-tryptyk]
path = "tryptyk2.webp"
caption = """\
Tryptyk Biesiadny (_Triptych of the Feast_, wordplay on Biesiad's name). Three portraits of Biesiad, painted on fragments of broken tables.

On the right, we see Biesiad during his entrance routine, standing high on a ladder and drinking beer.
The left shows a penitent, sad, handcuffed Biesiad from when he was imprisoned by [PM Shooter](@/a/pm-shooter-saga.md).
The central portrait depicts a dominant, possibly victorious Biesiad with his attribute - the red wooden ladder in hands.
It's also decorated with a barbed wire crown.
"""
source = "Krzysztof Zych"

