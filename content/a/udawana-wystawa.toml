[12-sciana-artefaktow]
path = "sciana-artefaktow-ppw.webp"
caption="""\
A wall display of various pieces of ring gear. The checkered red-brown shirt is one of Johnny Blade's iconic outfits. The three masks are: ?, Hirinus De Exsantus, Hades. Below them we have balaclavas of Extreme Floorfiller and Red Floorfiller, and the black mask of Ultimo Combo.

The green weed-themed shorts belong to Biesiad. Next to the right is Axel Fox's signature fox-themed ring gear, then Gustav Gryffin's singlet, Goblin's mask, fur jacket and shorts. Last are Olgierd's bat, Legia Łysych scarf and shorts.
"""
source = "Krzysztof Zych"