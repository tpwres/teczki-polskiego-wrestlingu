{% if notes is string -%}
  <span class="nt">NOTE: {{ notes | markdown(inline=true) | safe }}</span>
{% elif notes %}
  <span class="nt">
    NOTES:<br/>
    <ul>
    {% for note in notes %}
        <li>{{ note | markdown(inline=true) | safe }}</li>
    {% endfor %}
    </ul>
  </span>
{% endif -%}
